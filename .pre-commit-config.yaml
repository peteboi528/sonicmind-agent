# 提交前兜底：把 CI 的 ruff / gitleaks 检查前移到本地提交时。
# 首次启用：pip install pre-commit && pre-commit install
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9  # 对齐 pyproject dev 的 ruff>=0.6.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
